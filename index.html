    // ※ 고용보험은 '신규고용' 조건이라 자동판정하지 않고 수동 체크 유지

        const ntHrs = parseFloat(form.nightHours) || 0; // 야간근로
        const hdHrs = parseFloat(form.holidayHours) || 0; // 휴일근로 8h 이내
        const hdHrsOver = parseFloat(form.holidayHoursOver) || 0; // 휴일근로 8h 초과
        const alDays = parseFloat(form.annualLeaveDays) || 0; // 미사용 연차
        // 가산 배수
        const otRate = isUnder5 ? 1.0 : 1.5; // 연장: 5인 미만은 1배, 이상은 1.5배
        const ntRate = isUnder5 ? 1.0 : 1.5; // 야간: 동일
        const hdRate = isUnder5 ? 1.0 : 1.5; // 휴일 8h이내: 동일

        const overtimePay = Math.floor(oH * otHrs * otRate);
        const nightPay = Math.floor(oH * ntHrs * ntRate);
        const holidayPay = Math.floor(oH * hdHrs * hdRate);
        const holidayOverPay = Math.floor(oH * hdHrsOver * hdOverRate);
        const totalAllowance = overtimePay + nightPay + holidayPay + holidayOverPay;
        // 연차수당: 1일 통상임금 × 미사용일수 (5인 이상만 의무 발생)
        // 1일 통상임금 = 통상시급 × 1일 소정근로시간 (보통 8h)
        const dailyOrdinary = oH * 8;
        const annualLeavePay = isUnder5 ? 0 : Math.floor(dailyOrdinary * alDays);
        // ── 일할계산 적용 ──
        let proRate = null;
        let gross = grossFull;
        let baseProRated = base, mealProRated = meal, carProRated = car, chProRated = ch, oNtProRated = oNt;
        if (form.proRateEnabled) {

            chProRated = Math.floor(ch * ratio);
